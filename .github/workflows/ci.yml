name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            frontend/packages/vjs-plugin-font-icons/package-lock.json
            frontend/packages/vjs-plugin/package-lock.json
            frontend/packages/media-player/package-lock.json

      - name: Build workspace package — vjs-plugin-font-icons
        working-directory: frontend/packages/vjs-plugin-font-icons
        run: |
          npm ci --no-fund --no-audit
          npm run build

      - name: Build workspace package — vjs-plugin
        working-directory: frontend/packages/vjs-plugin
        run: |
          npm ci --no-fund --no-audit
          npm run build

      - name: Build workspace package — media-player
        working-directory: frontend/packages/media-player
        run: |
          npm ci --no-fund --no-audit
          npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-fund --no-audit

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build
